<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Carl Engstler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Stick Grid Background -->
  <canvas id="stickGrid" class="stick-grid-bg"></canvas>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="header-home">CE</a>
    <nav class="header-nav">

      <a href="contact.html">Contact</a>

  </header>

  <!-- Main Content -->
  <main class="page-content">
    <div class="projects-container">

      <!-- Left Panel -->
      <div class="projects-left">

        <div class="scroll-wheels" id="scrollWheels">
          <div class="scroll-column" id="scrollColLeft"></div>
          <div class="scroll-column" id="scrollColRight"></div>

        <!-- Grid View (All Projects) -->
        <div class="projects-grid" id="projectsGrid"></div>

        <!-- Toggle Button -->
        <button class="view-toggle-btn" id="viewToggleBtn">VIEW GRID</button>
      </div>

      <!-- Right Panel -->
      <div class="projects-right" id="projectsRight">
        <div class="project-detail" id="projectDetail"></div>
      </div>

    </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="footer-copy">&copy; Carl Engstler 2026</span>
